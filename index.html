<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Architectural OS Portfolio</title>

<style>
/* ✅ 这里只改了 pagination-dots */

.pagination-dots {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 2rem; /* 👈 让中间有间距 */
    z-index: 10;
}

/* 👇 下面全部是你原来的代码（未改动） */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400&display=swap');

:root {
    --bg: #FCFCFC;
    --ink: #1A1A1A;
    --border: rgba(26, 26, 26, 0.15);
    --grid-line: #1A1A1A;
    --accent-gray: #E0E0E0;
    --accent-beige: #F8F5F0;
    --accent-sage: #F4F6F3;
    --transition: 0.7s cubic-bezier(0.2, 0, 0, 1);
    --transition-fast: 0.4s cubic-bezier(0.2, 0, 0, 1);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-font-smoothing: antialiased;
}

body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--ink);
    overflow: hidden;
    height: 100vh;
    width: 100vw;
}

.mono { font-family: 'JetBrains Mono', monospace; }

/* --- LAYER 0 --- */
#os-desktop {
    display: flex;
    height: 100vh;
    width: 100vw;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    scroll-behavior: smooth;
    cursor: grab;
    scrollbar-width: none;
}
#os-desktop::-webkit-scrollbar { display: none; }

.desktop-panel {
    min-width: 100vw;
    height: 100vh;
    scroll-snap-align: start;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
    padding: 10vw;
}

.desktop-panel h2 {
    font-size: 8vw;
    font-weight: 300;
    letter-spacing: -0.05em;
    text-transform: uppercase;
}

.desktop-panel .explore-btn {
    padding: 1rem 3rem;
    border: 1px solid var(--ink);
    text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.25em;
    cursor: pointer;
}

/* 其余代码完全保持原样 */
</style>
</head>

<body>

<div id="os-desktop">
    <section class="desktop-panel">
        <h2>THE BIO</h2>
    </section>
</div>

<div class="pagination-dots">
    <div class="perspective-nav">
        <div class="nav-tab active">01 BIO</div>
        <div class="nav-tab">02 ARCH DESIGN</div>
        <div class="nav-tab">03 DIGITAL ARCH</div>
        <div class="nav-tab">04 OTHER</div>
        <div class="nav-tab">05 CONTACT</div>
    </div>

    <div class="orbit-label">Orbit_System_V1.0</div>
</div>

</body>
</html>
